# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Stack complète (frontend + backend microservices)
#
# Lancement unique :
#   docker compose up --build
#
# Services exposés :
#   • Frontend      : http://localhost:3000
#   • Gateway (API) : http://localhost:8004
#   • Pipeline      : http://localhost:8000
#   • STT / LLM / TTS : ports 8001 / 8002 / 8003
#   • Watcher       : http://localhost:8005
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─── Frontend (Next.js standalone) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
    ports:
      # Bind sur 127.0.0.1 → seul nginx (sur le host) peut joindre le frontend.
      # Le public passe par nginx → https://traduction-audio.fr → 127.0.0.1:3000
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_GATEWAY_URL=${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:8004}
      - NEXT_PUBLIC_PIPELINE_URL=${NEXT_PUBLIC_PIPELINE_URL:-http://localhost:8000}
      - NEXT_PUBLIC_STT_URL=${NEXT_PUBLIC_STT_URL:-http://localhost:8001}
      - NEXT_PUBLIC_LLM_URL=${NEXT_PUBLIC_LLM_URL:-http://localhost:8002}
    depends_on:
      gateway:
        condition: service_healthy
      pipeline:
        condition: service_healthy
    restart: unless-stopped

  # ─── Gateway (Auth + Admin API) ────────────────────────────────────
  gateway:
    build:
      context: ./backend/services/gateway
    ports:
      - "127.0.0.1:8004:8004"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-use-32chars}
      - DEV_MODE=${DEV_MODE:-true}
      - FRONTEND_URLS=http://localhost:3000,http://localhost:3001
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - PIPELINE_URL=http://pipeline:8000
      - STT_URL=http://stt:8001
      - LLM_URL=http://llm:8002
      - TTS_URL=http://tts:8003
      - MLFLOW_URL=http://mlflow:5000
    volumes:
      - gateway_data:/app/data
      - ./outputs/experiments:/app/experiments:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8004/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Pipeline (Langchain LCEL orchestrator) ────────────────────────
  pipeline:
    build:
      context: ./backend/services/pipeline
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - STT_URL=http://stt:8001
      - LLM_URL=http://llm:8002
      - TTS_URL=http://tts:8003
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
    depends_on:
      stt:
        condition: service_healthy
      llm:
        condition: service_healthy
      tts:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── STT (Faster-Whisper) ──────────────────────────────────────────
  stt:
    build:
      context: ./backend/services/stt
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      # large-v3 = ~3 Go (recommandé : medium ou small si Docker Desktop limité)
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
    volumes:
      - whisper_cache:/home/app/.cache/huggingface
    mem_limit: 6g
    mem_reservation: 3g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health', timeout=20).status==200 else 1)"]
      interval: 30s
      timeout: 25s
      retries: 5
      start_period: 60s

  # ─── LLM (LiteLLM → Groq / OpenAI / Anthropic) ─────────────────────
  llm:
    build:
      context: ./backend/services/llm
    ports:
      - "127.0.0.1:8002:8002"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-groq/llama-3.1-8b-instant}
      - PROMPT_VERSION=${PROMPT_VERSION:-v1.1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── TTS (Mistral Voxtral + MMS-TTS fallback) ──────────────────────
  tts:
    build:
      context: ./backend/services/tts
    ports:
      - "127.0.0.1:8003:8003"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_VOICE_ID=${MISTRAL_VOICE_ID}
      - TTS_BACKEND=${TTS_BACKEND:-mistral}
    volumes:
      - tts_models:/home/app/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8003/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── Watcher (Live traffic SSE) ────────────────────────────────────
  watcher:
    build:
      context: ./backend/services/watcher
    ports:
      - "127.0.0.1:8005:8005"
    environment:
      # Whisper small/medium suffisant ici (flashs de ~30s, pas besoin de large-v3 → OOM)
      - WHISPER_MODEL=${WATCHER_WHISPER_MODEL:-small}
      - POLL_INTERVAL_S=${POLL_INTERVAL_S:-15}
      - MAX_EVENTS_PER_ZONE=${MAX_EVENTS_PER_ZONE:-10}
    mem_limit: 2g
    mem_reservation: 1g
    volumes:
      - watcher_data:/app/state
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8005/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ─── MLflow (Model Registry + Experiment Tracking) ────────────────
  mlflow:
    build:
      context: ./monitoring/mlflow
    ports:
      # 5000 occupé par AirPlay sur macOS → on expose en 5050
      - "127.0.0.1:5050:5000"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped

  # ─── Prometheus (collecte des métriques /metrics) ──────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    restart: unless-stopped

  # ─── Grafana (visualisation) ──────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_USERS_DEFAULT_THEME=dark
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # ─── Airflow stack (batch orchestration) ──────────────────────────
  # 4 conteneurs : postgres (metadata) + init (one-shot) + webserver + scheduler
  # LocalExecutor → pas de Celery/Redis. Suffisant pour le volume (qq DAGs/jour).
  airflow-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB:       airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-init:
    image: apache/airflow:2.10.3
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR:                LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:    postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
      AIRFLOW__CORE__LOAD_EXAMPLES:           'false'
      AIRFLOW__API__AUTH_BACKENDS:            'airflow.api.auth.backend.basic_auth'
      _AIRFLOW_DB_MIGRATE:        'true'
      _AIRFLOW_WWW_USER_CREATE:   'true'
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    user: "50000:0"
    entrypoint: /bin/bash
    command: -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@local || true"

  airflow-webserver:
    image: apache/airflow:2.10.3
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: &airflow-env
      AIRFLOW__CORE__EXECUTOR:                LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN:    postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES:           'false'
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG:      'true'
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: '300'
      AIRFLOW__WEBSERVER__WORKERS:            '2'
      AIRFLOW__API__AUTH_BACKENDS:            'airflow.api.auth.backend.basic_auth'
      PIPELINE_URL:                           http://pipeline:8000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data:ro
      - airflow_logs:/opt/airflow/logs
    ports:
      - "127.0.0.1:8080:8080"
    user: "50000:0"
    mem_limit: 2g
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.10.3
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./data:/opt/airflow/data:ro
      - airflow_logs:/opt/airflow/logs
    user: "50000:0"
    command: scheduler
    restart: unless-stopped

volumes:
  whisper_cache:
  tts_models:
  gateway_data:
  watcher_data:
  prometheus_data:
  grafana_data:
  mlflow_data:
  airflow_postgres_data:
  airflow_logs:
