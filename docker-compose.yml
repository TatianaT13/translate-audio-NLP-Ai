# docker-compose.yml — Phase 2 : 3 microservices STT + LLM + TTS
# Usage local : docker compose up --build
# Usage VPS   : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:

  # ─── Gateway Service (Auth) ─────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production-use-32chars}
      - DEV_MODE=${DEV_MODE:-true}
      - FRONTEND_URLS=http://localhost:3000
    volumes:
      - gateway_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Pipeline Service (Orchestrateur) ───────────────────────────
  pipeline:
    build:
      context: .
      dockerfile: services/pipeline/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - STT_URL=http://stt:8001
      - LLM_URL=http://llm:8002
      - TTS_URL=http://tts:8003
    depends_on:
      - stt
      - llm
      - tts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── STT Service ────────────────────────────────────────────────
  stt:
    build:
      context: .
      dockerfile: services/stt/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - WHISPER_MODEL=${WHISPER_MODEL:-small}
    volumes:
      # Cache des modèles Whisper téléchargés (évite re-téléchargement au restart)
      - whisper_cache:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── LLM Service ────────────────────────────────────────────────
  llm:
    build:
      context: .
      dockerfile: services/llm/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-groq/llama-3.1-8b-instant}
      - PROMPT_VERSION=${PROMPT_VERSION:-v1.1}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── TTS Service ────────────────────────────────────────────────
  tts:
    build:
      context: .
      dockerfile: services/tts/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - MISTRAL_VOICE_ID=${MISTRAL_VOICE_ID}
      - TTS_BACKEND=${TTS_BACKEND:-mistral}
    volumes:
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  whisper_cache:
  gateway_data:
